apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
spec:
  type: NodePort               # Exposes service externally on all nodes
  selector:
    app: fastapi
  ports:
    - protocol: TCP
      port: 8000               # Port your app listens on inside the cluster
      targetPort: 8000         # Port your container exposes
      nodePort: 30080          # External port on the node (30000-32767 range)
